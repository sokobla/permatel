# ─────────────────────────────────────────────────────────────────────────────
# PERMATEL — Nginx (frontend statique + proxy API)
# Sert le SPA, proxifie /api et /uploads vers le backend (same-origin),
# applique des en-têtes de sécurité et la compression.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Taille max des uploads (pièces jointes / avatars)
    client_max_body_size 16m;

    # ── Sécurité ──────────────────────────────────────────────────────────────
    # Les en-têtes de sécurité (HSTS, X-Frame-Options, nosniff, Referrer/Permissions
    # -Policy) sont appliqués par Traefik (edge) pour éviter les doublons.
    # Nginx étant interne, on se limite ici à masquer sa version.
    server_tokens off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── Healthcheck léger ─────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ── Proxy API → backend ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Fichiers servis par le backend (avatars, etc.)
    location /uploads/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Assets statiques (cache long, hashés par Vite) ────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
