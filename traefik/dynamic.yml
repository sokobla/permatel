# ─────────────────────────────────────────────────────────────────────────────
# PERMATEL — Traefik : configuration dynamique (provider fichier)
# Durcissement TLS appliqué aux routeurs via `tls.options=default@file`.
# ─────────────────────────────────────────────────────────────────────────────
tls:
  options:
    default:
      minVersion: VersionTLS12
      # sniStrict laissé à false : pour un domaine unique, l'activer renvoie
      # SSL_ERROR_UNRECOGNIZED_NAME_ALERT tant que le certificat ACME n'est pas
      # émis, ce qui masque la vraie cause. Réactiver seulement en multi-domaines maîtrisés.
      sniStrict: false
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      curvePreferences:
        - CurveP256
        - X25519
